name: Backfill Pipeline (manual)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      FEATURE_STORE_MODE: parquet
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Backfill historical features (API or synthetic fallback)
        run: python -m features.backfill_historical
      - name: Upload local feature store snapshot
        uses: actions/upload-artifact@v4
        with:
          name: local-feature-store
          path: .local_fs/
