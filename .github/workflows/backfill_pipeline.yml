name: Backfill Historical Data (manual / on-demand)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to backfill (default: 30)"
        required: false
        default: "30"

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run historical backfill (Open-Meteo → Feature Store)
        run: python -m features.backfill_historical
