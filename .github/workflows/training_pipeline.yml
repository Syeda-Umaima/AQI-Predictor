name: Training Pipeline (daily)

on:
  schedule:
    - cron: "0 2 * * *"      # every day at 02:00 UTC
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      FEATURE_STORE_MODE: parquet
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download latest feature store
        uses: actions/download-artifact@v4
        with:
          name: local-feature-store
          path: .local_fs/
        continue-on-error: true
      - name: Seed feature store if missing
        run: |
          if [ ! -f .local_fs/aqi_features.parquet ]; then
            python -m features.backfill_historical
          fi
      - name: Train + benchmark models
        run: python -m training.train
      - name: Generate SHAP explainability
        run: python -m training.evaluate
      - name: Upload model + artefacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            artifacts/
