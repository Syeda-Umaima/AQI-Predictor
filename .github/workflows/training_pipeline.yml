name: Training Pipeline (daily)

on:
  schedule:
    - cron: "0 2 * * *"  # every day at 02:00 UTC
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download latest local feature store (Parquet fallback)
        if: env.HOPSWORKS_API_KEY == ''
        uses: actions/download-artifact@v4
        with:
          name: local-feature-store
          path: .local_fs/
        continue-on-error: true

      - name: Seed feature store if missing (no Hopsworks + no Parquet)
        if: env.HOPSWORKS_API_KEY == ''
        run: |
          if [ ! -f .local_fs/aqi_features_v2.parquet ]; then
            echo "No feature store found — running backfill …"
            python -m features.backfill_historical
          fi

      - name: Train all models + select champion
        run: python -m training.train

      - name: Generate SHAP + LIME explainability artefacts
        run: python -m training.evaluate

      - name: Upload model artefacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            artifacts/
          retention-days: 30
