name: Feature Pipeline (hourly)

on:
  schedule:
    - cron: "0 * * * *"      # every hour, on the hour
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      HOPSWORKS_HOST: localhost
      HOPSWORKS_PROJECT: local_project
      HOPSWORKS_API_KEY: offline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run hourly feature ingestion
        run: python -m features.ingest_hourly
      - name: Upload local feature store snapshot
        uses: actions/upload-artifact@v4
        with:
          name: local-feature-store
          path: .local_fs/
          if-no-files-found: ignore
