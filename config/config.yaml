city:
  name: "Hyderabad, Sindh, Pakistan"
  latitude: 25.3924
  longitude: 68.3737
  timezone: "Asia/Karachi"

open_meteo:
  weather_url: "https://api.open-meteo.com/v1/forecast"
  weather_archive_url: "https://archive-api.open-meteo.com/v1/archive"
  air_quality_url: "https://air-quality-api.open-meteo.com/v1/air-quality"
  request_timeout_s: 30
  max_retries: 4
  backoff_base_s: 1.5
  weather_hourly_vars:
    - temperature_2m
    - relative_humidity_2m
    - apparent_temperature
    - wind_speed_10m
    - wind_direction_10m
    - surface_pressure
    - precipitation
    - cloud_cover
    - visibility
  air_quality_hourly_vars:
    - pm2_5
    - pm10
    - carbon_monoxide
    - nitrogen_dioxide
    - sulphur_dioxide
    - ozone
    - dust
    - us_aqi

backfill:
  days: 30
  chunk_days: 7

features:
  pollutants:
    - pm2_5
    - pm10
    - carbon_monoxide
    - nitrogen_dioxide
    - sulphur_dioxide
    - ozone
    - dust
  weather_vars:
    - temperature_2m
    - relative_humidity_2m
    - apparent_temperature
    - wind_speed_10m
    - surface_pressure
  lag_vars:
    - pm2_5
    - pm10
    - nitrogen_dioxide
    - temperature_2m
    - relative_humidity_2m
    - us_aqi
  lag_hours: [1, 2, 3, 24, 48]
  rolling_windows_hours: [3, 6, 12, 24]
  rolling_stats: [mean, std, min, max]
  rolling_vars:
    - pm2_5
    - pm10
    - nitrogen_dioxide
    - temperature_2m
    - relative_humidity_2m
    - us_aqi
  target_horizon_hours: 72

hopsworks:
  project: "AQI_Predictor_Hyderabad"
  feature_group_name: "aqi_features_v2"
  feature_group_version: 1
  model_registry_name: "aqi_champion"
  parquet_dir: ".local_fs"

training:
  test_size: 0.2
  random_state: 42
  lstm:
    sequence_length: 24
    epochs: 20
    batch_size: 32

dashboard:
  hazardous_aqi_threshold: 150
